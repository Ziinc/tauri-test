name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  examples-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            examples/tauri-app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install example dependencies
        run: npm ci
        working-directory: examples/tauri-app

      - name: Test example UI
        run: npm test
        working-directory: examples/tauri-app

  rust-ci:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            command: cargo fmt --check
          - os: ubuntu-latest
            command: cargo test --workspace --no-fail-fast
          - os: macos-latest
            command: cargo test --workspace --no-fail-fast

    name: ${{ matrix.command }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        if: matrix.command != 'cargo fmt --check'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with rustfmt
        if: matrix.command == 'cargo fmt --check'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.command == 'cargo test --workspace --no-fail-fast'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        if: matrix.command == 'cargo test --workspace --no-fail-fast'
        with:
          cache-on-failure: true

      - name: Run command
        run: ${{ matrix.command }}
